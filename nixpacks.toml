[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.mysqli",
  "php82Extensions.intl",
  "php82Extensions.curl",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.tokenizer",
  "php82Extensions.fileinfo",
  "composer"
]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"
